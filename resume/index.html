<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resume of Rishit Kar." />
    <title>Resume | Rishit Kar</title>
    <link rel="icon" type="image/svg+xml" href="../assets/site-icon.svg?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="resume.css" />
  </head>
  <body>
    <header class="resume-bar">
      <a class="back-link" href="../" aria-label="Back to portfolio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m15 18-6-6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span>Portfolio</span>
      </a>

      <div class="resume-title">
        <strong>Rishit Kar</strong>
        <span>Resume</span>
      </div>

      <div class="resume-actions">
        <a href="rishit-kar-resume.pdf" target="_blank" rel="noreferrer" aria-label="Open resume PDF in a new tab" title="Open PDF">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 5h5v5M19 5l-8 8M18 13v6H5V6h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>Open PDF</span>
        </a>
        <a href="rishit-kar-resume.pdf" download="Rishit-Kar-Resume.pdf" aria-label="Download resume PDF" title="Download PDF">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4v11m0 0 4-4m-4 4-4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>Download</span>
        </a>
      </div>
    </header>

    <main class="resume-viewer">
      <object data="rishit-kar-resume.pdf#view=FitH" type="application/pdf" aria-label="Rishit Kar resume">
        <div class="pdf-fallback">
          <p>Your browser cannot display the embedded resume.</p>
          <a href="rishit-kar-resume.pdf">Open the PDF</a>
        </div>
      </object>
    </main>
    <script>
      if (window.location.protocol !== "file:" && window.location.pathname.endsWith("/index.html")) {
        window.history.replaceState(null, "", "./");
      }
    </script>
  </body>
</html>
